<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chances de Fracaso</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%;
    height: 100%;
    background: #0a0a0a;
    overflow: hidden;
  }

  .stage {
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(255,255,255,0.012) 2px,
      rgba(255,255,255,0.012) 4px
    );
    pointer-events: none;
    z-index: 1;
  }

  .eyebrow {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 0.4em;
    color: #3a3a3a;
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s 0.3s forwards;
    z-index: 2;
  }

  .main-text {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(4rem, 12vw, 10rem);
    font-weight: 700;
    color: #e8e2d6;
    text-align: center;
    line-height: 1.05;
    letter-spacing: -0.02em;
    opacity: 0;
    animation: fadeUp 1s 0.6s forwards;
    position: relative;
    z-index: 2;
  }

  .main-text em {
    font-style: italic;
    color: #c9b99a;
  }

  .hint {
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    color: #282828;
    text-transform: uppercase;
    margin-top: 4rem;
    opacity: 0;
    animation: fadeUp 1s 1.2s forwards;
    z-index: 2;
  }

  .zero-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0a0a0a;
    opacity: 0;
    pointer-events: none;
    z-index: 10;
  }

  .zero-overlay.active {
    opacity: 1;
    pointer-events: all;
    animation: fadeIn 0.1s forwards;
  }

  .zero {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: clamp(20rem, 60vw, 55rem);
    font-weight: 700;
    color: #e8e2d6;
    line-height: 1;
    opacity: 0;
    transform: scale(0.05) rotate(-20deg);
  }

  .zero-overlay.active .zero {
    animation: zeroReveal 0.7s 0.05s cubic-bezier(0.22, 1, 0.36, 1) forwards;
  }

  .zero-label {
    position: absolute;
    bottom: 4rem;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    letter-spacing: 0.35em;
    color: #3a3a3a;
    text-transform: uppercase;
    opacity: 0;
  }

  .zero-overlay.active .zero-label {
    animation: fadeUp 0.5s 0.65s forwards;
  }

  .back {
    position: absolute;
    bottom: 2rem;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    letter-spacing: 0.2em;
    color: #2a2a2a;
    text-transform: uppercase;
    opacity: 0;
    cursor: pointer;
    border: none;
    background: none;
  }

  .back:hover { color: #555; }

  .zero-overlay.active .back {
    animation: fadeUp 0.5s 1.1s forwards;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @keyframes zeroReveal {
    0%   { opacity: 0; transform: scale(0.05) rotate(-20deg); }
    60%  { opacity: 1; transform: scale(1.07) rotate(2deg); }
    80%  { transform: scale(0.97) rotate(-0.5deg); }
    100% { opacity: 1; transform: scale(1) rotate(0deg); }
  }
</style>
</head>
<body>

<div class="stage" id="stage">
  <div class="scanlines"></div>

  <div class="eyebrow">Análisis definitivo — 2026</div>
  <div class="main-text">Chances de<br><em>fracaso</em></div>
  <div class="hint">— click para revelar —</div>

  <div class="zero-overlay" id="overlay">
    <div class="zero">0</div>
    <div class="zero-label">Probabilidad de fracaso</div>
    <button class="back" id="back">↩ volver</button>
  </div>
</div>

<script>
  const stage = document.getElementById('stage');
  const overlay = document.getElementById('overlay');
  const back = document.getElementById('back');
  let open = false;

  stage.addEventListener('click', () => {
    if (!open) {
      overlay.classList.add('active');
      open = true;
    }
  });

  back.addEventListener('click', (e) => {
    e.stopPropagation();
    overlay.classList.remove('active');
    open = false;
  });
</script>

</body>
</html>
